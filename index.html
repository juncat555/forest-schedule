<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>零陵森林公安排班表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif}
:root{--primary:#1a3a6b;--primary-light:#2d6cc0;--primary-dark:#0a1e3d;--primary-glow:#4a8fe0;--danger:#e84a4a;--success:#2d9e5a;--bg:#0a1628;--bg-card:#0f1d35;--bg-card-hover:#162a4a;--text:#e0e8f5;--text-secondary:#8ba4c7;--text-muted:#5a7a9f;--border:#1a3055;--border-light:#2a4a75;--shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-glow:0 0 20px rgba(45,108,192,0.15);--radius:10px}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 50% 0%, rgba(26,58,107,0.3) 0%, transparent 70%),linear-gradient(180deg, #0a1628 0%, #0d1e3a 100%)}

/* Layout */
#app{min-height:100vh;display:flex;flex-direction:column}
#content{flex:1;padding:20px 16px 24px;max-width:580px;margin:0 auto;width:100%}
.page{display:none}.page.active{display:block}
.page-header{text-align:center;margin-bottom:18px;padding-top:4px}
.page-header h2{font-size:21px;font-weight:700;color:#fff;letter-spacing:2px;text-shadow:0 0 20px rgba(74,143,224,0.3)}
/* Sub-page header (left aligned with buttons) */
.sub-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sub-header h2{font-size:20px;font-weight:600;color:var(--text);text-shadow:none;letter-spacing:normal}

/* Cards */
.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:600;margin-bottom:10px;color:var(--text);display:flex;align-items:center;gap:6px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer;transition:all 0.2s;font-weight:500}
.btn-primary{background:linear-gradient(135deg,var(--primary-light),var(--primary));color:#fff;box-shadow:0 2px 10px rgba(45,108,192,0.3)}.btn-primary:hover{box-shadow:0 4px 16px rgba(45,108,192,0.5);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#2d9e5a,#1a7a3e);color:#fff;box-shadow:0 2px 10px rgba(45,158,90,0.3)}.btn-success:hover{box-shadow:0 4px 16px rgba(45,158,90,0.5);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(135deg,#a02a2a,#e84a4a);color:#fff}.btn-danger:hover{transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--primary-glow);border:1px solid var(--border-light)}.btn-outline:hover{background:var(--bg-card-hover);border-color:var(--primary-glow);box-shadow:0 0 12px rgba(74,143,224,0.15)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{background:var(--bg-card);font-weight:600;color:var(--text-secondary);font-size:12px;position:sticky;top:0}

/* Forms */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:9px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;transition:all 0.2s;color:var(--text)}
.form-group input:focus,.form-group select:focus{border-color:var(--primary-glow);box-shadow:0 0 0 2px rgba(45,108,192,0.2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5);width:90%;max-width:520px;max-height:80vh;overflow-y:auto;padding:24px;border:1px solid var(--border)}
.modal h3{font-size:18px;margin-bottom:16px;color:var(--text)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

/* Checkbox list */
.checkbox-list{max-height:250px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:8px;background:var(--bg)}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;color:var(--text)}
.checkbox-item:hover{background:var(--bg-card-hover)}
.checkbox-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--primary-glow)}

/* History list */
.history-item{padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;cursor:pointer;transition:all 0.15s;background:var(--bg-card)}
.history-item:hover{background:var(--bg-card-hover);border-color:var(--primary-glow)}
.history-item .info{flex:1}
.history-item .title{font-weight:600;font-size:14px;color:var(--text)}
.history-item .meta{font-size:12px;color:var(--text-secondary);margin-top:2px}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-blue{background:rgba(45,108,192,0.2);color:var(--primary-glow)}
.tag-green{background:rgba(45,158,90,0.2);color:#4ade80}

/* Toast */
.toast{position:fixed;top:20px;right:20px;z-index:2000;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,0.4);transform:translateX(120%);transition:transform 0.3s;max-width:320px}
.toast.show{transform:translateX(0)}
.toast.success{background:linear-gradient(135deg,#1a7a3e,#2d9e5a)}
.toast.error{background:linear-gradient(135deg,#a02a2a,#e84a4a)}
.toast.info{background:linear-gradient(135deg,var(--primary),var(--primary-light))}

/* Schedule table styles */
.schedule-wrap{overflow-x:auto;margin-top:12px}
.schedule-wrap table{width:100%;font-size:12px;border-collapse:separate;border-spacing:0;border-radius:8px;overflow:hidden}
.schedule-wrap th{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:8px 4px;text-align:center;font-size:12px;font-weight:600}
.schedule-wrap td{padding:6px 2px;text-align:center;vertical-align:middle;line-height:1.4;border-bottom:1px solid var(--border);background:var(--bg-card)}
.schedule-wrap .week-label{font-weight:600;color:var(--text);font-size:11px;border-right:1px solid var(--border)}
.schedule-wrap .date-text{font-weight:700;color:var(--primary-glow);font-size:11px}
.schedule-wrap .name-text{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.schedule-wrap .phone-text{font-size:9px;color:var(--text-muted);line-height:1.1}
.schedule-wrap td.weekend{background:rgba(45,108,192,0.06)}
.schedule-wrap td.empty{background:var(--bg);color:var(--text-muted)}
.schedule-wrap .day-cell{min-height:56px;padding:4px 2px}
.schedule-wrap tr:hover td{background:var(--bg-card-hover)}
.schedule-title-bar{text-align:center;margin-bottom:12px}
.schedule-title-bar .main-title{font-size:16px;font-weight:700;color:var(--text)}
.schedule-title-bar .sub-title{font-size:12px;color:var(--text-secondary);margin-top:2px}

/* Today Duty Card */
.today-card{background:linear-gradient(135deg,#1a3a6b,#2d6cc0);border-radius:14px;padding:22px 28px;margin-bottom:16px;color:#fff;box-shadow:0 4px 24px rgba(26,58,107,0.4),0 0 48px rgba(45,108,192,0.08);border:1px solid rgba(74,143,224,0.15);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:relative;overflow:hidden}
.today-card::before{content:'';position:absolute;top:-60%;right:-20%;width:280px;height:280px;background:radial-gradient(circle,rgba(74,143,224,0.1) 0%,transparent 70%);pointer-events:none}
.today-card .today-date{font-size:16px;opacity:0.95;z-index:1}
.today-card .today-date strong{font-size:18px}
.today-card .today-people{text-align:right;z-index:1}
.today-card .today-people .label{font-size:12px;opacity:0.65;margin-bottom:4px;letter-spacing:2px;text-transform:uppercase}
.today-card .today-people .names{font-size:24px;font-weight:700;letter-spacing:2px}
.today-card .today-people .phones{font-size:14px;opacity:0.85;margin-top:4px;letter-spacing:1px}

/* Week Schedule Card */
#thisWeekSchedule{margin-bottom:0}
.week-card{background:var(--bg-card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.week-card-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:12px 16px;font-weight:600;font-size:15px;display:flex;justify-content:space-between;align-items:center}
.week-card-header .week-range{font-size:13px;opacity:0.85;font-weight:400}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.week-day-cell{padding:10px 2px;text-align:center;min-height:64px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.week-day-cell:not(:last-child){border-right:1px solid var(--border)}
.week-day-cell.weekend-cell{background:rgba(45,108,192,0.06)}
.week-day-cell .wd-label{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:2px}
.week-day-cell .wd-date{font-size:11px;color:var(--text-muted);margin-bottom:3px}
.week-day-cell .wd-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.5}
.week-day-cell .wd-split{font-size:8px;color:var(--border-light);line-height:0.8}
.week-day-cell.today-highlight{background:rgba(45,108,192,0.2);position:relative;border-radius:0}
.week-day-cell.today-highlight::after{content:'今天';position:absolute;top:-1px;right:-1px;font-size:9px;background:var(--primary-glow);color:#fff;padding:1px 7px;border-radius:0 0 0 6px;font-weight:600}
.week-day-cell.today-highlight .wd-name{color:var(--primary-glow);font-weight:700}

/* Responsive */
@media(max-width:600px){
  #content{padding:12px 10px 16px}
  .page-header{margin-bottom:12px}
  .page-header h2{font-size:18px}
  .today-card{padding:14px 16px;margin-bottom:12px}
  .today-card .today-date{font-size:13px}
  .today-card .today-date strong{font-size:14px}
  .today-card .today-people .names{font-size:18px}
  .today-card .today-people .phones{font-size:12px}
  .week-card-header{padding:10px 12px;font-size:14px}
  .week-day-cell{padding:8px 1px;min-height:52px}
  .week-day-cell .wd-label{font-size:11px}
  .week-day-cell .wd-date{font-size:10px}
  .week-day-cell .wd-name{font-size:12px;line-height:1.4}
}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.5}
.empty-state p{font-size:14px}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* File input */
.file-input-wrap{position:relative;display:inline-block}
.file-input-wrap input[type="file"]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
</style>
</head>
<body>

<div id="app">
  <!-- Main Content -->
  <main id="content">

    <!-- ===== Page: Home ===== -->
    <section id="page-home" class="page active">
      <div class="page-header">
        <h2>零陵森林公安排班表</h2>
      </div>
      <!-- 今日值班 -->
      <div id="todayDuty" class="today-card"></div>
      <!-- 本周值班表 -->
      <div id="thisWeekSchedule"></div>
    </section>

    <!-- ===== Page: Personnel ===== -->
    <section id="page-personnel" class="page">
      <div class="sub-header">
        <h2>👥 人员管理</h2>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="showPersonModal()">➕ 添加人员</button>
          <button class="btn btn-outline" onclick="importExcel()">📂 导入Excel</button>
        </div>
      </div>
      <div class="card">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <input type="text" id="personSearch" placeholder="🔍 搜索姓名/部门..." style="flex:1;min-width:150px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px" oninput="renderPersonnel()">
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th style="width:50px">序号</th><th>姓名</th><th>职务</th><th>部门</th><th>手机号</th><th style="width:120px">操作</th></tr></thead>
            <tbody id="personnelBody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="personnelEmpty" style="display:none">
          <div class="icon">👤</div><p>暂无人员数据，点击"添加人员"或"导入Excel"开始</p>
        </div>
      </div>
    </section>

    <!-- ===== Page: Schedule ===== -->
    <section id="page-schedule" class="page">
      <div class="sub-header"><h2>📅 排班生成</h2></div>
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <label>年份</label>
            <select id="schedYear"></select>
          </div>
          <div class="form-group">
            <label>月份</label>
            <select id="schedMonth"></select>
          </div>
        </div>
        <div class="form-group">
          <label>单位名称</label>
          <input type="text" id="schedUnit" placeholder="如：森林公安">
        </div>
        <div class="form-group">
          <label>排除人员（勾选不参与排班的人员）</label>
          <div id="excludeList" class="checkbox-list"></div>
        </div>
        <button class="btn btn-primary" onclick="generateSchedule()" id="genBtn">🔄 生成排班表</button>
      </div>
      <div id="scheduleResult" style="display:none">
        <div class="card">
          <div class="page-header">
            <h2 id="resultTitle" class="card-title"></h2>
            <div class="btn-group">
              <button class="btn btn-success" onclick="saveSchedule()">💾 保存排班</button>
              <button class="btn btn-outline" onclick="exportMarkdown()">📤 导出Markdown</button>
              <button class="btn btn-outline" onclick="window.print()">🖨️ 打印</button>
            </div>
          </div>
          <div class="schedule-wrap" id="scheduleTableWrap"></div>
        </div>
      </div>
    </section>

    <!-- ===== Page: History ===== -->
    <section id="page-history" class="page">
      <div class="sub-header">
        <h2>📚 排班历史</h2>
        <button class="btn btn-danger" onclick="clearAllHistory()">🗑️ 清空历史</button>
      </div>
      <div id="historyList"></div>
      <div class="empty-state" id="historyEmpty" style="display:none">
        <div class="icon">📭</div><p>暂无排班历史记录</p>
      </div>
    </section>

    <!-- ===== Page: Settings ===== -->
    <section id="page-settings" class="page">
      <div class="sub-header"><h2>⚙️ 设置</h2></div>
      <div class="card">
        <div class="form-group">
          <label>单位名称（默认）</label>
          <input type="text" id="settingsUnit" placeholder="如：森林公安" onchange="saveSettings()">
        </div>
        <div class="form-group">
          <label>数据管理</label>
          <div class="btn-group">
            <button class="btn btn-outline" onclick="exportData()">📤 导出所有数据</button>
            <button class="btn btn-outline" onclick="document.getElementById('importDataInput').click()">📂 导入数据</button>
            <input type="file" id="importDataInput" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn btn-danger" onclick="resetAllData()">⚠️ 重置所有数据</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">标题</h3>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== DATA LAYER ====================
const DB_KEY = 'forestScheduleDB';

// 从知识库人员名册提取的初始数据（永州市零陵区森林公安局）
// Sheet2（警备通登记表）手机号优先于 Sheet1
const INITIAL_PERSONS = [
  {id:"p01",serialNumber:1,name:"赵衡",title:"局长、一级警长",department:"局领导",phone:"19107462218",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p02",serialNumber:2,name:"李立",title:"政委、二级警长",department:"局领导",phone:"19107462212",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p03",serialNumber:3,name:"朱军",title:"副局长、二级警长",department:"局领导",phone:"17774687555",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p04",serialNumber:4,name:"陈瑞虎",title:"一级警长",department:"办公室",phone:"19107462286",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p05",serialNumber:5,name:"盛文娟",title:"一级警长",department:"办公室",phone:"19107462298",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p06",serialNumber:6,name:"唐鹏",title:"珠山森林派出所所长、一级警长",department:"珠山所",phone:"19107462290",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p07",serialNumber:7,name:"唐翔",title:"珠山森林派出所四级高级警长",department:"珠山所",phone:"19107462296",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p08",serialNumber:8,name:"朱敏",title:"珠山森林派出所二级警长",department:"珠山所",phone:"19107462209",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p09",serialNumber:9,name:"唐浩志",title:"珠山森林派出所四级警长",department:"珠山所",phone:"18874607758",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p10",serialNumber:10,name:"艾俊彦",title:"珠山森林派出所一级警员",department:"珠山所",phone:"13874775770",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p11",serialNumber:11,name:"伍俊球",title:"邮亭圩森林派出所所长、一级警长",department:"邮亭圩所",phone:"19107462268",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p12",serialNumber:12,name:"郑春波",title:"邮亭圩森林派出所教导员、一级警长",department:"邮亭圩所",phone:"19107462235",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p13",serialNumber:13,name:"吕保星",title:"邮亭圩森林派出所四级警长",department:"邮亭圩所",phone:"15399859348",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p14",serialNumber:14,name:"陈曦",title:"邮亭圩森林派出所一级警员",department:"邮亭圩所",phone:"15874613849",createdAt:"2026-06-18T15:00:00.000Z"},
  {id:"p15",serialNumber:15,name:"周涛",title:"邮亭圩森林派出所试用期公务员",department:"邮亭圩所",phone:"17774666914",createdAt:"2026-06-18T15:00:00.000Z"}
];

// 默认排除人员：局长（赵衡）和已调离（彭海波）
const DEFAULT_EXCLUDE_NAMES = ['赵衡'];

function getDB() {
  try {
    let db = JSON.parse(localStorage.getItem(DB_KEY));
    if (!db) {
      db = { persons: [], schedules: [], settings: { unitName: '零陵森林公安' } };
    }
    // 首次运行自动导入初始人员数据
    if (db.persons.length === 0) {
      db.persons = INITIAL_PERSONS;
      saveDB(db);
    }
    return db;
  } catch(e) { return { persons: INITIAL_PERSONS, schedules: [], settings: { unitName: '零陵森林公安' } }; }
}

function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

// ==================== TOAST ====================
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== NAVIGATION ====================
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item, .bottom-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');

// 渲染本周值班表
function renderThisWeek(persons, excludeNames, year, month, day) {
  const now = new Date(year, month - 1, day);
  // 找到本周一
  const monday = new Date(now);
  const dayOfWeek = now.getDay();
  const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  monday.setDate(now.getDate() + diff);
  
  // 生成周一到周日
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    weekDays.push(d);
  }
  
  // 计算每天值班人员
  const weekShort = ['一','二','三','四','五','六','日'];
  const available = persons.filter(p => !excludeNames.includes(p.name));
  available.sort((a, b) => (a.serialNumber || 999) - (b.serialNumber || 999));
  const N = available.length;
  
  const startStr = `${weekDays[0].getMonth()+1}/${weekDays[0].getDate()}`;
  const endStr = `${weekDays[6].getMonth()+1}/${weekDays[6].getDate()}`;
  
  let html = `<div class="week-card">
    <div class="week-card-header">
      <span>📋 本周值班表</span>
      <span class="week-range">${startStr} - ${endStr}</span>
    </div>
    <div class="week-grid">`;
  
  weekDays.forEach(d => {
    const dYear = d.getFullYear();
    const dMonth = d.getMonth() + 1;
    const dDay = d.getDate();
    const dow = d.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isToday = dYear === year && dMonth === month && dDay === day;
    
    // 计算值班人员
    const dayOfMonth = dDay;
    // 需要知道这个日期在它所在月份的第几天
    const firstDayOfMonth = new Date(dYear, dMonth - 1, 1);
    const t = Math.floor((d - firstDayOfMonth) / (24*60*60*1000));
    let p1 = null, p2 = null;
    if (N >= 2) {
      p1 = available[(t * 1) % N];
      p2 = available[(t * 1 + 1) % N];
    }
    
    const dowIdx = dow === 0 ? 6 : dow - 1;
    html += `<div class="week-day-cell ${isWeekend ? 'weekend-cell' : ''} ${isToday ? 'today-highlight' : ''}">
      <div class="wd-label">${weekShort[dowIdx]}</div>
      <div class="wd-date">${dMonth}/${dDay}</div>`;
    
    if (p1 && p2) {
      html += `<div class="wd-name">${p1.name}</div>
        <div class="wd-split">-</div>
        <div class="wd-name">${p2.name}</div>`;
      if (isToday) {
        html += `<div class="wd-phone">👈 今天</div>`;
      }
    } else {
      html += `<div class="wd-name" style="color:var(--text-muted)">-</div>`;
    }
    
    html += `</div>`;
  });
  
  html += '</div></div>';
  document.getElementById('thisWeekSchedule').innerHTML = html;
}

// 计算指定日期的值班人员
function calcTodayDuty(persons, excludeNames, year, month, day) {
  let available = persons.filter(p => !excludeNames.includes(p.name));
  available.sort((a, b) => (a.serialNumber || 999) - (b.serialNumber || 999));
  if (available.length < 2) return null;
  const N = available.length;
  // 计算当月第几天（从1开始）
  const firstDay = new Date(year, month - 1, 1);
  const t = day - 1;
  const idx1 = (t * 1) % N;
  const idx2 = (t * 1 + 1) % N;
  return [available[idx1], available[idx2]];
}

// 自动排班生成核心函数
function autoGenerateSchedule(persons, year, month, excludeNames) {
  let available = persons.filter(p => !excludeNames.includes(p.name));
  available.sort((a, b) => (a.serialNumber || 999) - (b.serialNumber || 999));
  if (available.length < 2) return null;

  const totalDays = new Date(year, month, 0).getDate();
  const N = available.length;
  const days = [];
  for (let d = 1; d <= totalDays; d++) {
    const t = d - 1;
    days.push({
      date: `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
      persons: [available[(t * 1) % N], available[(t * 1 + 1) % N]]
    });
  }

  // 组织自然周
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const dayMap = {};
  days.forEach(d => { dayMap[d.date] = d.persons; });

  const weeks = [];
  const cursor = new Date(firstDay);
  while (cursor.getDay() !== 1) cursor.setDate(cursor.getDate() - 1);

  let weekNum = 0;
  while (cursor <= lastDay || weekNum === 0) {
    const week = { weekNumber: ++weekNum, days: [] };
    for (let i = 0; i < 7; i++) {
      const d = new Date(cursor);
      d.setDate(cursor.getDate() + i);
      const key = d.toISOString().split('T')[0];
      const inMonth = d.getFullYear() === year && d.getMonth() === month - 1;
      week.days.push({
        date: key,
        persons: inMonth && dayMap[key] ? dayMap[key] : []
      });
    }
    weeks.push(week);
    cursor.setDate(cursor.getDate() + 7);
    if (cursor > lastDay) break;
    if (weeks.length > 6) break;
  }

  return { weeks, available, availableCount: available.length };
}

// Import Excel (using SheetJS CDN)
function importExcel() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.xlsx,.xls';
  input.onchange = async function(e) {
    const file = e.target.files[0]; if (!file) return;
    try {
      const data = await file.arrayBuffer();
      if (typeof XLSX === 'undefined') {
        showToast('⏳ 正在加载Excel解析库...', 'info');
        await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
      }
      const workbook = XLSX.read(data, { type: 'array' });
      
      // Read Sheet1 (personnel roster)
      const sheet1 = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet1, { header: 1, defval: '' });
      
      if (rows.length < 2) { showToast('Excel文件内容为空', 'error'); return; }
      
      // Try to find headers
      const headerRow = rows[0];
      const colMap = {};
      headerRow.forEach((h, i) => {
        const hstr = String(h).trim();
        if (hstr.includes('姓名') || hstr === '姓名') colMap.name = i;
        if (hstr.includes('序号') || hstr === '序号' || hstr.includes('编号')) colMap.serial = i;
        if (hstr.includes('职务') || hstr === '职务') colMap.title = i;
        if (hstr.includes('部门') || hstr === '部门' || hstr.includes('单位')) colMap.dept = i;
        if (hstr.includes('手机') || hstr.includes('电话') || hstr === '联系方式') colMap.phone = i;
      });

      // Also check Sheet2 for phone numbers
      let phoneMap = {};
      if (workbook.SheetNames.length > 1) {
        const sheet2 = workbook.Sheets[workbook.SheetNames[1]];
        const rows2 = XLSX.utils.sheet_to_json(sheet2, { header: 1, defval: '' });
        const h2 = rows2[0];
        let nameIdx2 = -1, phoneIdx2 = -1;
        h2.forEach((h, i) => {
          const hs = String(h).trim();
          if (hs.includes('姓名')) nameIdx2 = i;
          if (hs.includes('手机') || hs.includes('电话')) phoneIdx2 = i;
        });
        if (nameIdx2 >= 0 && phoneIdx2 >= 0) {
          for (let r = 1; r < rows2.length; r++) {
            const row = rows2[r];
            const n = String(row[nameIdx2] || '').trim();
            const p = String(row[phoneIdx2] || '').trim();
            if (n) phoneMap[n] = p;
          }
        }
      }

      const db = getDB();
      let added = 0;
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        const name = colMap.name !== undefined ? String(row[colMap.name] || '').trim() : '';
        if (!name) continue;
        
        const phone = phoneMap[name] || (colMap.phone !== undefined ? String(row[colMap.phone] || '').trim() : '');
        
        // Check duplicate by name
        if (db.persons.some(p => p.name === name)) continue;
        
        db.persons.push({
          id: genId(), name,
          serialNumber: colMap.serial !== undefined ? parseInt(row[colMap.serial]) || (db.persons.length + 1) : (db.persons.length + 1),
          title: colMap.title !== undefined ? String(row[colMap.title] || '').trim() : '',
          department: colMap.dept !== undefined ? String(row[colMap.dept] || '').trim() : '',
          phone: phone,
          createdAt: new Date().toISOString()
        });
        added++;
      }
      saveDB(db); renderPersonnel();
      showToast(`✅ 成功导入 ${added} 名人员！`);
    } catch(err) {
      showToast('导入失败：' + err.message, 'error');
    }
  };
  input.click();
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script'); s.src = src;
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function generateSchedule() {
  const db = getDB();
  if (db.persons.length === 0) { showToast('⚠️ 请先添加人员', 'error'); return; }

  const year = parseInt(document.getElementById('schedYear').value);
  const month = parseInt(document.getElementById('schedMonth').value);
  const unit = document.getElementById('schedUnit').value.trim() || '森林公安';

  // Get excluded person IDs
  const checkedBoxes = document.querySelectorAll('#excludeList input[type="checkbox"]:checked');
  const excludedIds = Array.from(checkedBoxes).map(cb => cb.value);

  // Filter personnel list
  let available = db.persons.filter(p => !excludedIds.includes(p.id));
  available.sort((a, b) => (a.serialNumber || 999) - (b.serialNumber || 999));

  if (available.length < 2) { showToast('⚠️ 至少需要2人才能排班', 'error'); return; }

  // Calculate month days
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const totalDays = lastDay.getDate();

  // Generate daily rotation schedule
  const N = available.length;
  const days = [];
  for (let d = 1; d <= totalDays; d++) {
    const t = d - 1;
    const idx1 = (t * 1) % N;
    const idx2 = (t * 1 + 1) % N;
    days.push({
      date: new Date(year, month - 1, d),
      persons: [available[idx1], available[idx2]]
    });
  }

  // Organize into weeks (Mon-Sun)
  const weeks = [];
  let currentWeek = [];
  // Find the first Monday of the month (or before)
  let cursor = new Date(firstDay);
  // Go back to Monday if needed
  while (cursor.getDay() !== 1) {
    cursor.setDate(cursor.getDate() - 1);
  }

  // Build weeks covering the full month
  const weekStart = new Date(cursor);
  while (true) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      week.push(d);
    }
    weeks.push(week);
    weekStart.setDate(weekStart.getDate() + 7);
    if (weekStart > lastDay) break;
    // Safety: limit weeks
    if (weeks.length > 6) break;
  }

  // Build schedule data
  const scheduleDays = {};
  days.forEach(d => {
    const key = d.date.toISOString().split('T')[0];
    scheduleDays[key] = d.persons;
  });

  // Render (双格式：桌面表格 + 手机卡片)
  const title = `${unit}${month}月排班表`;
  document.getElementById('resultTitle').textContent = '📊 ' + title;
  const weekDayNames = ['周一','周二','周三','周四','周五','周六','周日'];
  const weekDayShort = ['一','二','三','四','五','六','日'];
  
  // -- 表格版 --
  let html = '<table><thead><tr><th style="min-width:60px">周次</th>';
  weekDayNames.forEach(wd => { html += `<th>${wd}</th>`; });
  html += '</tr></thead><tbody>';

  let weekNum = 0;
  const weekData = []; // store week data for cards
  weeks.forEach(week => {
    const firstDateOfWeek = week[0];
    const hasDaysInMonth = week.some(d => d.getFullYear() === year && d.getMonth() === month - 1);
    if (!hasDaysInMonth) return;

    weekNum++;
    html += `<tr><td class="week-label">第${weekNum}周</td>`;
    const weekDaysData = [];
    week.forEach(d => {
      const isCurrentMonth = d.getFullYear() === year && d.getMonth() === month - 1;
      const dayOfWeek = d.getDay();
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
      const key = d.toISOString().split('T')[0];
      const persons = scheduleDays[key];

      if (!isCurrentMonth || !persons) {
        html += `<td class="empty">-</td>`;
        weekDaysData.push({ persons: [] });
      } else {
        const dayNum = d.getDate();
        html += `<td class="day-cell ${isWeekend ? 'weekend' : ''}">
          <div class="date-text">${month}月${dayNum}日</div>
          <div class="name-text">${persons[0].name}</div>
          <div class="phone-text">${persons[0].phone || '无'}</div>
          <div class="name-text">${persons[1].name}</div>
          <div class="phone-text">${persons[1].phone || '无'}</div>
        </td>`;
        weekDaysData.push({ date: key, persons: persons.map(p => ({name: p.name, phone: p.phone})), dayOfWeek, isWeekend, dayNum });
      }
    });
    html += '</tr>';
    weekData.push({ weekNumber: weekNum, days: weekDaysData });
  });

  html += '</tbody></table>';

  // -- 卡片版 --
  let cardsHtml = '';
  weekData.forEach(wk => {
    const validDays = wk.days.filter(d => d.persons && d.persons.length > 0);
    const startD = validDays.length > 0 ? new Date(validDays[0].date + 'T00:00:00') : null;
    const endD = validDays.length > 0 ? new Date(validDays[validDays.length-1].date + 'T00:00:00') : null;
    let rangeStr = '';
    if (startD && endD) rangeStr = `${startD.getMonth()+1}/${startD.getDate()}-${endD.getMonth()+1}/${endD.getDate()}`;

    cardsHtml += `<div class="week-card">
      <div class="week-card-header"><span>第${wk.weekNumber}周</span><span class="week-range">${rangeStr}</span></div>
      <div class="week-card-body">`;
    wk.days.forEach(d => {
      if (!d.persons || d.persons.length === 0) {
        cardsHtml += `<div class="day-card empty-card"><div class="day-label">-</div></div>`;
      } else {
        const dow = d.dayOfWeek === 0 ? 6 : d.dayOfWeek - 1;
        cardsHtml += `<div class="day-card ${d.isWeekend ? 'weekend-card' : ''}">
          <div class="day-label">${weekDayShort[dow]}</div>
          <div class="day-date">${month}/${d.dayNum}</div>
          <div class="day-name">${d.persons[0].name}</div>
          <div class="day-phone">${d.persons[0].phone || ''}</div>
          <div class="day-split">-</div>
          <div class="day-name">${d.persons[1].name}</div>
          <div class="day-phone">${d.persons[1].phone || ''}</div>
        </div>`;
      }
    });
    cardsHtml += '</div></div>';
  });

  document.getElementById('scheduleTableWrap').innerHTML = html + `<div class="schedule-cards">${cardsHtml}</div>`;
  document.getElementById('scheduleResult').style.display = 'block';

  // Store current schedule for saving
  window._currentSchedule = { year, month, unit, title, excludedIds, personnelList: available, weeks: weeks.map((w, wi) => ({
    weekNumber: wi + 1,
    days: w.map(d => {
      const key = d.toISOString().split('T')[0];
      const ps = scheduleDays[key] || [];
      return { date: key, persons: ps.map(p => ({ id: p.id, name: p.name, phone: p.phone })) };
    })
  }))};

  showToast(`✅ ${title} 生成成功！`);
}

// ==================== SAVE / HISTORY ====================
function saveSchedule() {
  if (!window._currentSchedule) { showToast('请先生成排班表', 'error'); return; }
  const db = getDB();
  const s = window._currentSchedule;
  // Check duplicate
  const dup = db.schedules.some(s2 => s2.year === s.year && s2.month === s.month);
  if (dup && !confirm(`⚠️ ${s.year}年${s.month}月已有排班记录，是否覆盖？`)) return;
  
  if (dup) db.schedules = db.schedules.filter(s2 => !(s2.year === s.year && s2.month === s.month));
  
  db.schedules.push({
    id: genId(),
    year: s.year, month: s.month,
    title: s.title, unit: s.unit,
    excludedIds: s.excludedIds,
    personnelList: s.personnelList,
    weeks: s.weeks,
    createdAt: new Date().toISOString()
  });
  saveDB(db);
  showToast('💾 排班已保存！');
}

function renderHistory() {
  const db = getDB();
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  
  if (db.schedules.length === 0) {
    list.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';
  
  const sorted = [...db.schedules].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  list.innerHTML = sorted.map(s => {
    const date = new Date(s.createdAt);
    return `<div class="history-item">
      <div class="info" onclick="viewHistory('${s.id}')">
        <div class="title">${s.title}</div>
        <div class="meta">👥 ${s.personnelList.length}人 · 生成于 ${date.toLocaleDateString()} ${date.toLocaleTimeString().substr(0,5)}</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();viewHistory('${s.id}')">👁️</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteHistory('${s.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function viewHistory(id) {
  const db = getDB();
  const s = db.schedules.find(x => x.id === id);
  if (!s) { showToast('记录不存在', 'error'); return; }

  // Navigate to schedule page and show
  navigate('schedule');
  document.getElementById('schedYear').value = s.year;
  document.getElementById('schedMonth').value = s.month;
  document.getElementById('schedUnit').value = s.unit || db.settings.unitName;
  renderExcludeList();
  // Check excluded
  document.querySelectorAll('#excludeList input[type="checkbox"]').forEach(cb => {
    if (s.excludedIds && s.excludedIds.includes(cb.value)) cb.checked = true;
  });

  // Rebuild display (双格式)
  const title = s.title;
  document.getElementById('resultTitle').textContent = '📊 ' + title;
  const weekDayNames = ['周一','周二','周三','周四','周五','周六','周日'];
  const weekDayShort = ['一','二','三','四','五','六','日'];
  
  // -- 表格版 --
  let html = '<table><thead><tr><th style="min-width:60px">周次</th>';
  weekDayNames.forEach(wd => { html += `<th>${wd}</th>`; });
  html += '</tr></thead><tbody>';

  s.weeks.forEach(week => {
    html += `<tr><td class="week-label">第${week.weekNumber}周</td>`;
    week.days.forEach(d => {
      const dateObj = new Date(d.date + 'T00:00:00');
      const dayOfWeek = dateObj.getDay();
      const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
      const month = dateObj.getMonth() + 1;
      const dayNum = dateObj.getDate();

      if (d.persons.length === 0) {
        html += `<td class="empty">-</td>`;
      } else {
        html += `<td class="day-cell ${isWeekend ? 'weekend' : ''}">
          <div class="date-text">${month}月${dayNum}日</div>
          <div class="name-text">${d.persons[0].name}</div>
          <div class="phone-text">${d.persons[0].phone || '无'}</div>
          <div class="name-text">${d.persons[1].name}</div>
          <div class="phone-text">${d.persons[1].phone || '无'}</div>
        </td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';

  // -- 卡片版 --
  let cardsHtml = '';
  s.weeks.forEach(week => {
    const validDays = week.days.filter(d => d.persons && d.persons.length > 0);
    const startD = validDays.length > 0 ? new Date(validDays[0].date + 'T00:00:00') : null;
    const endD = validDays.length > 0 ? new Date(validDays[validDays.length-1].date + 'T00:00:00') : null;
    let rangeStr = '';
    if (startD && endD) rangeStr = `${startD.getMonth()+1}/${startD.getDate()}-${endD.getMonth()+1}/${endD.getDate()}`;

    cardsHtml += `<div class="week-card">
      <div class="week-card-header"><span>第${week.weekNumber}周</span><span class="week-range">${rangeStr}</span></div>
      <div class="week-card-body">`;
    week.days.forEach(d => {
      if (!d.persons || d.persons.length === 0) {
        cardsHtml += `<div class="day-card empty-card"><div class="day-label">-</div></div>`;
      } else {
        const dateObj = new Date(d.date + 'T00:00:00');
        const dayOfWeek = dateObj.getDay();
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
        const m = dateObj.getMonth() + 1;
        const dayNum = dateObj.getDate();
        const dow = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
        cardsHtml += `<div class="day-card ${isWeekend ? 'weekend-card' : ''}">
          <div class="day-label">${weekDayShort[dow]}</div>
          <div class="day-date">${m}/${dayNum}</div>
          <div class="day-name">${d.persons[0].name}</div>
          <div class="day-phone">${d.persons[0].phone || ''}</div>
          <div class="day-split">-</div>
          <div class="day-name">${d.persons[1].name}</div>
          <div class="day-phone">${d.persons[1].phone || ''}</div>
        </div>`;
      }
    });
    cardsHtml += '</div></div>';
  });

  document.getElementById('scheduleTableWrap').innerHTML = html + `<div class="schedule-cards">${cardsHtml}</div>`;
  document.getElementById('scheduleResult').style.display = 'block';

  window._currentSchedule = s;
  showToast('👁️ 已加载历史排班', 'info');
}

function deleteHistory(id) {
  if (!confirm('确定要删除该排班记录吗？')) return;
  const db = getDB(); db.schedules = db.schedules.filter(s => s.id !== id);
  saveDB(db); renderHistory(); showToast('🗑️ 已删除', 'info');
}

function clearAllHistory() {
  const db = getDB();
  if (db.schedules.length === 0) { showToast('暂无历史记录', 'info'); return; }
  if (!confirm(`确定要清空全部 ${db.schedules.length} 条排班历史记录吗？此操作不可撤销！`)) return;
  db.schedules = []; saveDB(db); renderHistory(); showToast('🗑️ 已清空所有历史记录', 'info');
}

// ==================== EXPORT ====================
function exportMarkdown() {
  if (!window._currentSchedule) { showToast('请先生成或查看一个排班表', 'error'); return; }
  const s = window._currentSchedule;
  let md = `# ${s.title}\n\n`;
  md += `| 周次 | 周一 | 周二 | 周三 | 周四 | 周五 | 周六 | 周日 |\n`;
  md += `| :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: |\n`;

  s.weeks.forEach(week => {
    md += `| 第${week.weekNumber}周`;
    week.days.forEach(d => {
      if (d.persons.length === 0) {
        md += ` | -`;
      } else {
        const dateObj = new Date(d.date + 'T00:00:00');
        const m = dateObj.getMonth() + 1;
        const day = dateObj.getDate();
        md += ` | ${m}月${day}日<br>${d.persons[0].name}<br>${d.persons[0].phone || ''}<br>${d.persons[1].name}<br>${d.persons[1].phone || ''}`;
      }
    });
    md += ` |\n`;
  });

  // Download
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${s.title}.md`;
  a.click(); URL.revokeObjectURL(url);
  showToast('📤 Markdown 已下载！');
}

function exportMarkdownLatest() {
  // 优先使用首页当前显示的排班
  if (window._currentSchedule && window._currentSchedule.weeks) {
    exportMarkdown();
    return;
  }
  const db = getDB();
  if (db.schedules.length === 0) { showToast('暂无排班记录可导出', 'error'); return; }
  const latest = db.schedules[db.schedules.length - 1];
  window._currentSchedule = latest;
  exportMarkdown();
}

// ==================== SETTINGS ====================
function saveSettings() {
  const db = getDB();
  db.settings.unitName = document.getElementById('settingsUnit').value.trim() || '零陵森林公安';
  saveDB(db);
  showToast('⚙️ 设置已保存', 'info');
}

function loadSettings() {
  const db = getDB();
  document.getElementById('settingsUnit').value = db.settings.unitName || '零陵森林公安';
}

function exportData() {
  const db = getDB();
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '森林排班数据备份.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('📤 数据已导出');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.persons || !data.schedules) { showToast('数据格式无效', 'error'); return; }
      if (!confirm(`将导入 ${data.persons.length} 名人员和 ${data.schedules.length} 条排班记录，是否覆盖当前数据？`)) return;
      saveDB(data); renderPersonnel(); renderHistory(); renderHome();
      showToast('✅ 数据导入成功！');
    } catch(err) { showToast('导入失败：' + err.message, 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetAllData() {
  if (!confirm('⚠️ 确定要重置所有数据吗？此操作不可撤销！\n\n将清除所有人员信息和排班记录。')) return;
  if (!confirm('二次确认：真的要全部清空吗？')) return;
  saveDB({ persons: [], schedules: [], settings: { unitName: '零陵森林公安' } });
  renderPersonnel(); renderHistory(); renderHome(); loadSettings();
  document.getElementById('scheduleResult').style.display = 'none';
  showToast('✅ 已重置所有数据');
}

// ==================== MODAL ====================
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ==================== INIT ====================
function init() {
  initScheduleForm();
  loadSettings();
  renderHome();
}

init();
</script>
